name: Sync to Gitee

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GIT_TERMINAL_PROMPT: 0
        run: |
          if [ -z "$GITEE_TOKEN" ]; then
            echo "ERROR: GITEE_TOKEN secret is empty"
            exit 1
          fi
          git remote add gitee https://oauth2:${GITEE_TOKEN}@gitee.com/wangchao199703/desk-helper.git
          # 从 origin(GitHub)取全量分支与 tag,再镜像推到 Gitee。
          # 用 origin/main 显式推 main,避免 tag 触发时 detached HEAD 下无本地 main 分支。
          git fetch origin --tags --force
          git push gitee "refs/remotes/origin/main:refs/heads/main" --force
          git push gitee --tags --force
